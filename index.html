<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPSTI | 罗德岛博士强度人格审计</title>
    <style>
        :root {
            --bg: #0f1317;
            --panel: #1a2026;
            --text: #bdc5cd;
            --color-super-big: #ff4d4d; /* 红色 */
            --color-big: #ffc600;       /* 黄色 */
            --color-mid: #a55eea;       /* 紫色 */
            --color-small: #00b4ff;     /* 蓝色 */
            --color-xsmall: #26de81;    /* 绿色 */
        }
        body { background: var(--bg); color: #fff; font-family: 'Inter', 'PingFang SC', sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        #app { width: 100%; max-width: 650px; padding: 20px; box-sizing: border-box; }
        .container { background: var(--panel); padding: 25px; border: 1px solid #333; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .progress-container { width: 100%; height: 4px; background: #2a323a; margin: 15px 0; }
        #progress-bar { height: 100%; width: 0%; background: var(--color-mid); transition: width 0.3s; }
        h1 { font-size: 1.2rem; border-left: 4px solid var(--color-mid); padding-left: 15px; margin-bottom: 20px; }
        .q-text { font-size: 1.1rem; margin-bottom: 25px; line-height: 1.6; min-height: 60px; }
        .opt-btn { display: block; width: 100%; padding: 14px 20px; margin-bottom: 10px; background: #252c33; border: 1px solid #3d4650; color: var(--text); text-align: left; cursor: pointer; transition: 0.2s; font-size: 0.95rem; line-height: 1.4; }
        .opt-btn:hover { background: #313b45; border-color: var(--color-mid); color: #fff; }
        .nav-btns { display: flex; gap: 10px; margin-top: 20px; }
        .back-btn { background: #2a323a; color: #888; border: 1px solid #444; padding: 10px 20px; cursor: pointer; flex: 1; font-size: 0.9rem; }
        .hit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 20px 0; }
        .hit-item { font-size: 0.75rem; padding: 8px; background: #12161b; border: 1px solid #2a323a; display: flex; justify-content: space-between; align-items: center; }
        .tag { font-size: 0.65rem; padding: 2px 5px; border-radius: 2px; font-weight: bold; color: #000; }
        .tag-super-big { background: var(--color-super-big); color: #fff; }
        .tag-big { background: var(--color-big); }
        .tag-mid { background: var(--color-mid); color: #fff; }
        .tag-small { background: var(--color-small); color: #fff; }
        .tag-xsmall { background: var(--color-xsmall); }
        .cup-title { font-size: 3.5rem; margin: 10px 0; font-weight: 800; text-align: center; }
        .desc-text { font-size: 0.9rem; line-height: 1.8; color: var(--text); background: rgba(0,0,0,0.3); padding: 15px; margin: 20px 0; border-radius: 4px; text-align: left; border-left: 3px solid #555; }
        .audit-list { text-align: left; margin-top: 30px; border-top: 1px solid #444; padding-top: 20px; }
        .audit-node { margin-bottom: 25px; }
        .audit-node h4 { margin: 0 0 8px 0; font-size: 1rem; color: #eee; display: flex; align-items: center; justify-content: space-between; }
        .audit-content { font-size: 0.85rem; line-height: 1.7; color: #9aa4af; padding-bottom: 10px; border-bottom: 1px dotted #333; }
        .disclaimer { font-size: 0.7rem; color: #555; text-align: center; margin-top: 30px; border-top: 1px solid #222; padding-top: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div id="app">
    <div id="start-screen" class="container">
        <h1>DPSTI 强度人格审计</h1>
        <p style="color:var(--text); line-height:1.6; font-size:0.9rem;">检测到博士登录。PRTS 将扫描 30 个作战决策逻辑，审计你的爆发、费用、范围、机制四大性能指标。<br><br><b>系统校准：</b>本审计包含 10 维 5 档深度解析。审计过程无法中断，请确保神经链接稳定。</p>
        <button class="opt-btn" onclick="startNewTest()" style="text-align:center; border-color:var(--color-mid); font-weight:bold;">[ 开始强度评估 ]</button>
        <div onclick="showArchive()" style="color:var(--color-mid); text-align:center; margin-top:15px; cursor:pointer; font-size:0.85rem; text-decoration: underline;">查看全性格属性分级标准 >></div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div style="color:var(--color-mid); font-size:0.8rem; font-family:monospace; margin-bottom:5px;" id="q-idx">ANALYSIS // 01</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div class="container">
            <div class="q-text" id="q-text">正在初始化...</div>
            <div id="opts"></div>
            <div class="nav-btns">
                <button class="back-btn" id="prev-btn" onclick="prevQuestion()">返回上一题</button>
            </div>
        </div>
    </div>

    <div id="res-screen" class="hidden container" style="text-align:center;">
        <p style="font-size:0.8rem; opacity:0.6;">审计报告已生成</p>
        <div id="hit-stat" style="font-weight:bold; font-family:monospace; color:var(--text); letter-spacing:1px;">命中强势维度: 0 / 10</div>
        <div class="cup-title" id="final-cup">中杯</div>
        <div id="hit-grid-container" class="hit-grid"></div>
        <div class="desc-text" id="personality-desc"></div>
        <div id="audit-report" class="audit-list"></div>
        <button class="opt-btn" onclick="location.reload()" style="text-align:center; margin-top:30px;">[ 重新初始化系统 ]</button>
        <div class="disclaimer">免责声明：此测试基于 MBTI 和 SBTI 逻辑，结果仅供娱乐参考。</div>
    </div>

    <div id="archive-screen" class="hidden container">
        <h1>性格维度档案库</h1>
        <div id="archive-list" style="font-size:0.85rem; line-height:1.8; color:var(--text)">正在调取档案内容...</div>
        <button class="opt-btn" onclick="showView('start-screen')" style="text-align:center; margin-top:20px;">[ 返回主界面 ]</button>
    </div>
</div>

<script>
    const questions = [
        { q: "面对高难关卡的首个精英怪，你的操作是？", o: [{t:"决战技爆发带走",s:{P:2,C:1}},{t:"低费挡枪磨血",s:{P:-1,C:-1}},{t:"特种推拉玩机制",s:{M:-2}},{t:"漏掉保蓝点",s:{M:-1}}]},
        { q: "项目研发时，你最希望？", o: [{t:"拥有无限预算，打出力大砖飞的效果",s:{C:2,M:2}},{t:"极限压人低配通关",s:{C:-2,M:-1}},{t:"全图支援到处都有我",s:{A:2}},{t:"深耕单点技术",s:{A:-2}}]},
        { q: "朋友求助时，你的态度？", o: [{t:"瞬间起身去解决",s:{P:2}},{t:"陪着直到解决",s:{P:-2}},{t:"需要补偿（费）",s:{C:2}},{t:"流程化指导",s:{M:1}}]},
        { q: "喜欢的技能形态？", o: [{t:"落地点火插拔",s:{P:2,C:-1}},{t:"永续常驻挂机",s:{P:-2,M:1}},{t:"全图超大范围",s:{A:2}},{t:"吟唱后毁灭性输出",s:{P:2,C:2}}]},
        { q: "社交聚餐时你是？", o: [{t:"全场焦点社交达人",s:{A:2}},{t:"只聊身边两个",s:{A:-1}},{t:"低头猛吃拒沟通",s:{A:-2,C:-1}},{t:"点菜统筹负责人",s:{M:2}}]},
        { q: "面对下毒（缺陷）？", o: [{t:"回转极慢",s:{P:-2}},{t:"费极高",s:{C:2}},{t:"范围窄",s:{A:-2}},{t:"白板无机制",s:{M:-2}}]},
        { q: "面对不公规则？", o: [{t:"暴力拆迁不解释",s:{M:2}},{t:"钻Bug找漏洞",s:{M:-2}},{t:"群体Buff改变环境",s:{A:2}},{t:"积累SP等翻盘",s:{P:-1}}]},
        { q: "学习状态接近？", o: [{t:"考前过载模式",s:{P:2}},{t:"每天一点基石型",s:{P:-2}},{t:"需奖励（奶）才学",s:{C:2}},{t:"自创逻辑体系",s:{M:-2}}]},
        { q: "被降到1级时你？", o: [{t:"完全没用靠练度",s:{C:2}},{t:"优秀工具人",s:{C:-2}},{t:"寻找新赛道",s:{M:-1}},{t:"底子好在哪都行",s:{M:2}}]},
        { q: "情绪回转周期？", o: [{t:"极快，一顿饭就好",s:{P:1}},{t:"极慢，记仇三年",s:{P:-2}},{t:"随机性极强",s:{M:-1}},{t:"无波动纯机械",s:{M:2}}]},
        { q: "探索城市的方式？", o: [{t:"暴力跑图走三万步",s:{P:1,M:1}},{t:"精研攻略走捷径",s:{M:-1,C:-1}},{t:"随心所欲乱逛",s:{A:1}},{t:"必须住五星级",s:{C:2}}]},
        { q: "桌面整洁度？", o: [{t:"强迫症级别整齐",s:{M:2}},{t:"乱中有序",s:{M:-1}},{t:"乱成废墟（高费）",s:{C:2}},{t:"无固定位",s:{A:2}}]},
        { q: "对基石稳健看法？", o: [{t:"向往安稳挂机",s:{P:-2}},{t:"追求刺激波峰",s:{P:2}},{t:"基石需点缀爆发",s:{P:1}},{t:"只在乎是否耐打",s:{M:1}}]},
        { q: "为虚荣透支自己？", o: [{t:"会，为那刻的高光",s:{P:2,C:2}},{t:"不会，性价比低",s:{C:-2}},{t:"看影响力够不够",s:{A:1}},{t:"不屑一顾",s:{M:1}}]},
        { q: "社交回信习惯？", o: [{t:"长篇大论怕漏说",s:{A:2}},{t:"单字敷衍",s:{A:-2}},{t:"只发表情包",s:{M:-2}},{t:"偶尔诈尸",s:{P:2}}]},
        { q: "哪种成就感更高？", o: [{t:"力压群雄",s:{M:2}},{t:"四两拨千斤",s:{M:-2}},{t:"助人满足感",s:{A:1}},{t:"单纯交差",s:{P:-1}}]},
        { q: "如何看待被替代？", o: [{t:"我有核心竞争力",s:{M:2}},{t:"正好退休",s:{C:-1}},{t:"转职新分支",s:{M:-1}},{t:"巨大危机感",s:{P:1}}]},
        { q: "复杂人际中你是？", o: [{t:"真理在射程内",s:{M:2}},{t:"少说话多观察",s:{A:-1}},{t:"长袖善舞",s:{A:2}},{t:"被黑的特种",s:{M:-2}}]},
        { q: "你吃拐（靠人帮）吗？", o: [{t:"没人帮我不行",s:{C:2}},{t:"偶尔需配合",s:{C:1}},{t:"我帮别人（拐）",s:{A:1,M:-1}},{t:"绝食选手全单通",s:{C:-2,M:2}}]},
        { q: "生活节奏像？", o: [{t:"赛车高速奔驰",s:{P:2}},{t:"公园漫步者",s:{P:-1}},{t:"旅行者走停停",s:{P:0}},{t:"静止的雕像",s:{P:-2}}]},
        { q: "到新环境先看？", o: [{t:"谁是老大",s:{M:1}},{t:"规矩与漏洞",s:{M:-2}},{t:"哪里好摸鱼",s:{C:-1}},{t:"潜在朋友圈",s:{A:2}}]},
        { q: "对完美的执念？", o: [{t:"极致对齐",s:{M:2}},{t:"够用就行",s:{M:-1}},{t:"完美太贵不要",s:{C:-1}},{t:"我就是完美",s:{M:1}}]},
        { q: "工作位偏好？", o: [{t:"独立单格",s:{A:-2}},{t:"开放广域",s:{A:2}},{t:"咖啡馆",s:{C:1}},{t:"家里蹲",s:{C:-2}}]},
        { q: "面对批评反应？", o: [{t:"极速回击",s:{P:2}},{t:"记小本子等时机",s:{P:-1}},{t:"虚心不改",s:{M:-2}},{t:"深刻反思",s:{M:1}}]},
        { q: "你还有多少潜能？", o: [{t:"未精二等质变",s:{M:-2}},{t:"已满配无潜能",s:{M:1}},{t:"看你给多少费",s:{C:2}},{t:"无限扩展",s:{M:2}}]},
        { q: "如何证明自己？", o: [{t:"晒工资头衔",s:{M:2}},{t:"晒解决的问题",s:{M:-2}},{t:"晒人脉圈",s:{A:2}},{t:"不屑证明",s:{C:-2}}]},
        { q: "对“强”的定义？", o: [{t:"无可替代性",s:{M:2}},{t:"高容错率",s:{C:-1}},{t:"处处发光",s:{A:2}},{t:"瞬间改变局势",s:{P:2}}]},
        { q: "战场选哪个职能？", o: [{t:"近卫冲锋",s:{P:2,M:1}},{t:"重装保护",s:{M:1,A:1}},{t:"医疗补给",s:{C:-1,A:1}},{t:"特种玩杂技",s:{M:-2}}]},
        { q: "目前的杯级自我评价？", o: [{t:"小杯进阶中",s:{P:1}},{t:"稳健中杯",s:{M:0}},{t:"必须超大杯",s:{M:1}},{t:"隐藏六星级咸鱼",s:{C:-2}}]},
        { q: "对审计的态度？", o: [{t:"有趣再来",s:{P:1}},{t:"数据一般",s:{M:1}},{t:"只要好结果",s:{C:1}},{t:"这就完了？",s:{C:-1}}]}
    ];

    const auditNodes = [
        { name: "决战输出", getVal: (s)=>s.P, range:[7, 3, -3, -7], cups:["超大杯","大杯","中杯","小杯","超小杯"],
          texts: {
            "超大杯": "你的 $DPS$ 处于过载爆发态。面对 DDL 或核心冲突，你具备‘真银斩’级别的毁灭性瞬间处理能力，不给对手留任何回转余地。",
            "大杯": "高效的火力手。你能在高压下稳定产出有效价值，虽然偶尔需要短暂冷却（精神回转），但爆发期内的产出质量极高。",
            "中杯": "常规输出位。你的人生逻辑平滑且稳健，虽然不常有惊世骇俗的瞬时表现，但足以在大多数常态化关卡中维持及格线以上的产出。",
            "小杯": "输出能力存在下毒倾向。你在高压面前往往因为回转太慢而无法及时点火，导致问题堆积，最终在生存博弈中陷入被动。",
            "超小杯": "严重的性能亏损。审计显示你完全不具备攻坚性能，不仅白值（基础能力）低下，且在关键时刻极易因压力过大而产生‘眩晕’负面状态。"
          }
        },
        { name: "基石防御", getVal: (s)=>s.P*-1, range:[7, 3, -3, -7], cups:["超大杯","大杯","中杯","小杯","超小杯"],
          texts: {
            "超大杯": "极致的防御基石。你拥有不讲道理的情绪稳定性与容错率，即使在潮水般的变故冲击下也能稳站原地，这种‘挂机’级的强悍令人惊叹。",
            "大杯": "扎实的阵地防护。你具备出色的自愈与调节机制，面对生活的‘磨血’攻击游刃有余。你是团队中最值得信赖的中坚支柱。",
            "中杯": "标准的防御深度。你遵循泰拉世界的平衡规律，能正常抵挡大多数日常变故。虽然面对‘真伤’打击会吃力，但能通过协作弥补缺陷。",
            "小杯": "防御端脆弱。你极其容易受到环境负面信号的影响，在面对轻微的挫折打击时就会产生严重的‘漏怪’倾向，防线千疮百孔。",
            "超小杯": "阻挡数为 0 的真空防御。你完全丧失了对抗压力的能力，任何生活的小插曲都能直接穿透你的心理防线。你的人格白值极低，完全无法胜任站场需求。"
          }
        },
        { name: "低费模板", getVal: (s)=>s.C*-1, range:[7, 3, -3, -7], cups:["超大杯","大杯","中杯","小杯","超小杯"],
          texts: {
            "超大杯": "罕见的零费人权卡。你的人格完全不需要外界资源的奶量或情绪关怀，具备极强的独立自驱动性能，随时随地‘即插即用’。",
            "大杯": "高效率的低耗人才。你擅长以极简的成本撬动极高的产出，启动前不需要繁杂的心理建设。你是所有协作环境中的顶级泛用神。",
            "中杯": "合理的资源投入。你的性能发挥依赖于环境的基本支持。你奉行等价交换的逻辑，虽然不具备‘空降’的灵活性，但胜在可预测性高。",
            "小杯": "性格费用高昂。你是一个典型的‘高压锅’人格，开启工作前需要大量的外部资源投入（夸奖、铺垫、特权），这极大地稀释了你的实战价值。",
            "超小杯": "严重的成本下毒。启动你的代价之高往往超过了你所能产出的价值。由于性格过于娇贵（费高），你在大多数动态审计中都会因‘卡手’而被率先放弃。"
          }
        },
        { name: "精英部署", getVal: (s)=>s.C, range:[7, 3, -3, -7], cups:["超大杯","大杯","中杯","小杯","超小杯"],
          texts: {
            "超大杯": "高质感的精英重器。你对自己有着近乎偏执的尊严与标准，非关键时刻不轻易下场，但只要落位，必是扭转乾坤的唯一变变量。",
            "大杯": "极具深度的上位人格。你的人格含金量极高，倾向于在重要节点进行深度深耕。虽然启动节奏慢，但那种精英阶层的统治力毋庸置疑。",
            "中杯": "稳健的专业定位。你明白自身价值的代价，并愿意在规则内维护精英形象。你的人格质感适中，能在中端及以上赛道保持体面的活跃度。",
            "小杯": "人格质感稀薄。你似乎缺乏对自己核心价值的审计，过度消耗自我于琐碎。你的人格缺乏深度护城河，极易在精英层级的竞争中被淘汰。",
            "超小杯": "彻底的廉价感。你完全没有建立起任何自我防护机制，像是一个部署即撤回的廉价炮灰。你的人格白值下毒严重，无法在核心位置站稳脚跟。"
          }
        },
        { name: "全图打击", getVal: (s)=>s.A, range:[7, 3, -3, -7], cups:["超大杯","大杯","中杯","小杯","超小杯"],
          texts: {
            "超大杯": "全图视野的社交真神。你的影响力跨越了圈层与地域，具备恐怖的跨赛道解决能力。你是天生的节点管理者，视野内一切皆为射程。",
            "大杯": "广域光环拥有者。你在任何社交场域都自带 BUFF 属性，不仅能管好自己的一路，还能为周围提供强力支援，是团队的中坚枢纽。",
            "中杯": "标准的攻击范围。你专注于眼前的职守，对外界的感知与干预保持在合理的阈值。你是一个合格的执行者，虽不跨界但守位极其精准。",
            "小杯": "严重的短手困境。你的人格影响力仅局限于极窄的个人圈子。你在复杂的宏观博弈中往往因为视野受限而无法捕捉到核心战机，显得查无此人。",
            "超小杯": "极端的孤岛人格。审计显示你完全丧失了与外界的连通性。你的视野被局限在脚下的单一格内，这种自闭式的性能导致你在现代协作中毫无价值。"
          }
        },

    let current = 0, history = [], scores = {P:0, C:0, A:0, M:0};

    // 核心切换逻辑
    function showView(v){
        document.querySelectorAll('#start-screen, #quiz-screen, #res-screen, #archive-screen').forEach(e => e.classList.add('hidden'));
        const target = document.getElementById(v);
        if(target) target.classList.remove('hidden');
        window.scrollTo(0,0);
    }

    // 重置并开始测试
    function startNewTest(){
        current = 0;
        history = [];
        scores = {P:0, C:0, A:0, M:0};
        showView('quiz-screen');
        renderQuestion();
    }

    // 渲染档案库（提前生成内容）
    function showArchive(){
        const list = document.getElementById('archive-list');
        list.innerHTML = auditNodes.map(n => `
            <div style="margin-bottom:20px; border-bottom:1px solid #444; padding-bottom:10px;">
                <b style="color:var(--color-mid); font-size:1rem;">${n.name}:</b><br>
                <span style="font-size:0.8rem; opacity:0.8;">基于性格坐标综合判定。</span><br>
                <span style="color:var(--color-super-big)">● 超大杯</span> / <span style="color:var(--color-big)">● 大杯</span> / <span style="color:var(--color-mid)">● 中杯</span> / <span style="color:var(--color-small)">● 小杯</span> / <span style="color:var(--color-xsmall)">● 超小杯</span>
            </div>
        `).join('');
        showView('archive-screen');
    }

    function renderQuestion(){
        if(current >= questions.length) return;
        let q = questions[current];
        document.getElementById('q-idx').innerText = "ANALYSIS // " + String(current+1).padStart(2,'0');
        document.getElementById('progress-bar').style.width = (current/questions.length*100) + "%";
        document.getElementById('q-text').innerText = q.q;
        
        const optBox = document.getElementById('opts');
        optBox.innerHTML = '';
        
        q.o.forEach(o => {
            let b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = o.t;
            b.onclick = () => {
                history.push({ scores: JSON.parse(JSON.stringify(scores)) });
                for(let k in o.s) scores[k] += o.s[k];
                current++;
                if(current < questions.length) renderQuestion();
                else showResult();
            };
            optBox.appendChild(b);
        });
        document.getElementById('prev-btn').style.visibility = current > 0 ? 'visible' : 'hidden';
    }

    function prevQuestion(){
        if(current > 0){
            current--;
            const lastState = history.pop();
            scores = lastState.scores;
            renderQuestion();
        }
    }

    function getCup(val, range, cups){
        for(let i=0; i<range.length; i++) if(val >= range[i]) return cups[i];
        return cups[cups.length-1];
    }

    function showResult(){
        showView('res-screen');
        let hitPower = 0;
        const reportData = auditNodes.map(n => {
            const val = n.getVal(scores);
            const cup = getCup(val, n.range, n.cups);
            if(cup === "超大杯" || cup === "大杯") hitPower++;
            return { name: n.name, cup: cup, desc: n.texts[cup] };
        });

        document.getElementById('hit-stat').innerText = `命中强势维度: ${hitPower} / 10`;
        const cupNames = ["超小杯", "小杯", "中杯", "大杯", "超大杯"];
        const finalIdx = Math.min(Math.floor(hitPower/2) + 1, 4);
        const finalCup = cupNames[finalIdx];
        const finalEl = document.getElementById('final-cup');
        finalEl.innerText = finalCup;
        
        const colorMap = {"超大杯":"var(--color-super-big)","大杯":"var(--color-big)","中杯":"var(--color-mid)","小杯":"var(--color-small)","超小杯":"var(--color-xsmall)"};
        finalEl.style.color = colorMap[finalCup];

        // 渲染 10 维矩阵
        document.getElementById('hit-grid-container').innerHTML = reportData.map(d => {
            const tagClass = d.cup==='超大杯'?'tag-super-big':d.cup==='大杯'?'tag-big':d.cup==='中杯'?'tag-mid':d.cup==='小杯'?'tag-small':'tag-xsmall';
            return `<div class="hit-item"><span>${d.name}</span><span class="tag ${tagClass}">${d.cup}</span></div>`;
        }).join('');

        // 渲染详细审计
        document.getElementById('audit-report').innerHTML = reportData.map(d => {
            const tagClass = d.cup==='超大杯'?'tag-super-big':d.cup==='大杯'?'tag-big':d.cup==='中杯'?'tag-mid':d.cup==='小杯'?'tag-small':'tag-xsmall';
            return `<div class="audit-node"><h4>${d.name} <span class="tag ${tagClass}">${d.cup}</span></h4><div class="audit-content">${d.desc}</div></div>`;
        }).join('');

        let sumDesc = "综合审计报告汇总：";
        if(hitPower >= 7) sumDesc += "博士，你目前的数据显示出恐怖的‘强度溢出’。你在处理极端冲突时具备无死角的压制力，且保值率极高，是不受版本影响的绝对核心。";
        else if(hitPower >= 3) sumDesc += "你是罗德岛的中坚力量。虽然不具备降维打击的白值，但由于性能分布平衡，你在大多数社会环境下都能跑通高效的产出轴。";
        else sumDesc += "特种潜质人格。常规赛道可能限制了你的发挥，你的价值通常隐藏在极少数需要逃票思维或特定对策的难关中。建议避开正面硬刚。";
        document.getElementById('personality-desc').innerText = sumDesc;
    }
